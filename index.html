<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Layout</title>
    <style>
      :root {
        color-scheme: dark;
        --paper: #000000;
        --ink: #ffffff;
        --muted: #999999;
        --accent: #aaaaaa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        background: var(--paper);
        color: var(--ink);
        overscroll-behavior: none;
      }

      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
        cursor: default;
        overflow: hidden;
      }

      .page {
        position: relative;
        height: 100vh;
        overflow: hidden;
        overscroll-behavior: none;
        isolation: isolate;
      }

      .page--mobile {
        min-height: 100svh;
        height: 100svh;
        overflow: hidden;
      }

      .atmosphere {
        position: absolute;
        inset: -10%;
        pointer-events: none;
        z-index: 0;
        opacity: 1;
      }

      .atmosphere--left {
        background: none;
      }

      .atmosphere--right {
        background: none;
      }

      .hint-pill {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        margin: 0;
        padding: 10px 16px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: rgba(0, 0, 0, 0.9);
        font: 500 12px/1.2 "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.015em;
        white-space: nowrap;
        user-select: none;
        pointer-events: none;
        z-index: 5;
        box-shadow: 0 14px 32px rgba(255, 255, 255, 0.1);
      }

      .page--mobile .hint-pill {
        display: none;
      }

      .stage {
        position: relative;
        height: 100%;
      }

      .page--mobile .stage {
        height: 100%;
        min-height: 0;
      }

      .headline {
        position: absolute;
        margin: 0;
        font: inherit;
        user-select: text;
        z-index: 1;
      }

      .headline-line {
        position: absolute;
        white-space: pre;
        color: var(--ink);
        cursor: text;
      }

      .credit {
        position: absolute;
        margin: 0;
        font: 12px/16px "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
        color: rgba(255, 255, 255, 0.58);
        user-select: text;
        cursor: text;
        z-index: 1;
      }

      #three-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .line {
        position: absolute;
        white-space: pre;
        color: var(--ink);
        font-weight: 450;
        letter-spacing: 0.002em;
        user-select: text;
        cursor: text;
        transition: color 120ms ease;
        z-index: 1;
      }

      .line:hover {
        color: var(--accent);
      }

      @media (max-width: 760px) {
        .credit {
          font-size: 11px;
          letter-spacing: 0.12em;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <canvas id="three-canvas"></canvas>
      <div class="atmosphere atmosphere--left"></div>
      <div class="atmosphere atmosphere--right"></div>
      <p class="hint-pill">Text laid out with pretext, 3D models with three.js. Resize the window, then click the models.</p>
      <div id="stage" class="stage"></div>
    </main>

    <script type="module" src="./dynamic-layout.ts"></script>
  </body>
</html>
